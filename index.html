<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS Sender</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:30px;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
cursor:pointer;
}

#status{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>GPS Sender</h1>

<button onclick="startTracking()">
Start Tracking
</button>

<button onclick="stopTracking()">
Stop Tracking
</button>

<div id="status">
Tracking Stopped
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCg7tt1ZNyCu052ER7QETecNrbtnqOjzsU",
  authDomain: "car-security-app-e8b94.firebaseapp.com",
  databaseURL: "https://car-security-app-e8b94-default-rtdb.firebaseio.com",
  projectId: "car-security-app-e8b94",
  storageBucket: "car-security-app-e8b94.firebasestorage.app",
  messagingSenderId: "614504432857",
  appId: "1:614504432857:web:a914a36f920f6f9de1eac8",
  measurementId: "G-DX9B5TBE2Y"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let watchId = null;

window.startTracking = function(){

document.getElementById("status").innerHTML =
"Tracking Started";

watchId =
navigator.geolocation.watchPosition(

(position)=>{

const latitude = position.coords.latitude;
const longitude = position.coords.longitude;

set(ref(db,"gps"),{
latitude: latitude,
longitude: longitude,
timestamp: Date.now()
});

document.getElementById("status").innerHTML =
"Latitude: " + latitude +
"<br>Longitude: " + longitude;

},

(error)=>{

document.getElementById("status").innerHTML =
error.message;

},

{
enableHighAccuracy:true
}

);

}

window.stopTracking = function(){

if(watchId!==null){

navigator.geolocation.clearWatch(watchId);

document.getElementById("status").innerHTML =
"Tracking Stopped";

}

}

</script>

</body>

</html>
