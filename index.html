<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GPS Sender</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:30px;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
cursor:pointer;
}

#status{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>GPS Sender</h1>

<button onclick="startTracking()">
Start Tracking
</button>

<button onclick="stopTracking()">
Stop Tracking
</button>

<div id="status">
Tracking Stopped
</div>

<script>

let watchId = null;

function startTracking(){

document.getElementById("status")
.innerHTML =
"Tracking Started";

watchId =
navigator.geolocation.watchPosition(

(position)=>{

document.getElementById("status")
.innerHTML =

"Latitude: " +
position.coords.latitude +
"<br>Longitude: " +
position.coords.longitude;

},

(error)=>{

document.getElementById("status")
.innerHTML =
error.message;

}

);

}

function stopTracking(){

if(watchId!==null){

navigator.geolocation
.clearWatch(watchId);

document.getElementById("status")
.innerHTML =
"Tracking Stopped";

}

}

</script>

</body>

</html>
